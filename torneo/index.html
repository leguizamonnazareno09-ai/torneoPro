<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneos</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0d0d0d 50%, #2b2b2b 50%);
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 15px 25px;
    display: flex;
    justify-content: flex-end;
    z-index: 1000;
}

.btn {
    padding: 10px 20px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    display: inline-block;
}

.btn-signup {
    background: #0d5c7d;
    color: white;
    border: 2px solid #0d5c7d;
}

.btn-signup:hover {
    background: transparent;
    transform: scale(1.05);
}

/* Resto del estilo (igual que antes) */
.container {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.logo {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #0d5c7d;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.7);
    margin-bottom: 35px;
}

.search-box {
    background: #ddd;
    border-radius: 30px;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.search-box input {
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-size: 16px;
    color: #111;
    margin-left: 10px;
}

#results {
    margin-top: 20px;
    width: 100%;
    max-width: 340px;
}

.result {
    padding: 12px 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    transition: 0.3s;
}

.result:hover {
    background: #222;
    transform: scale(1.02);
}

/* Modales (sin cambios) */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal.active { display: flex; }

.title {
    text-align: center;
    font-weight: bold;
    margin-bottom: 30px;
    font-size: 1.6em;
}

.option, .torneo {
    text-align: center;
    margin: 12px 0;
    font-size: 22px;
    cursor: pointer;
    padding: 15px;
    border-radius: 12px;
    width: 100%;
    max-width: 320px;
    background: #1f1f1f;
    transition: 0.3s;
}

.option:hover, .torneo:hover {
    background: #0d5c7d;
    transform: scale(1.03);
}

.close {
    position: absolute;
    right: 25px;
    top: 20px;
    font-size: 32px;
    cursor: pointer;
    color: #aaa;
}

.close:hover { color: white; }
</style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <a href="registro.html" class="btn btn-signup">Registrarse</a>
    </header>

    <div class="container">
        <img src="img/logo.jpeg" alt="TorneoPro" class="logo">

        <div class="search-box">
            🔍
            <input type="text" id="search" placeholder="Ingresa el nombre de tu torneo">
        </div>

        <div id="results"></div>
    </div>

    <!-- Modales (sin cambios) -->
    <div class="modal" id="modalTipo"> ... (mismo código de modales) </div>
    <div class="modal" id="modalTorneos"> ... (mismo código) </div>

<script>
// Tu JavaScript actual (sin cambios)
const torneosBusqueda = ["LA PELOTA NO SE MACHA", "LA PREVIA FC", "LA MORITA", "EL TURCO"];
const torneos6 = ["TORNEO APERTURA 2026 MASC F6"];
const torneos7 = ["TORNEO APERTURA 2026 MASC F7", "SUMMER CUP MASC F7 🏆"];

const search = document.getElementById("search");
const results = document.getElementById("results");
const modalTipo = document.getElementById("modalTipo");
const modalTorneos = document.getElementById("modalTorneos");
const listaTorneos = document.getElementById("listaTorneos");

search.addEventListener("input", () => {
    const texto = search.value.toLowerCase();
    results.innerHTML = "";
    if (!texto) return;

    torneosBusqueda
        .filter(t => t.toLowerCase().includes(texto))
        .forEach(t => {
            const div = document.createElement("div");
            div.classList.add("result");
            div.textContent = t;
            div.onclick = () => modalTipo.classList.add("active");
            results.appendChild(div);
        });
});

function mostrarTorneos(tipo) {
    modalTipo.classList.remove("active");
    modalTorneos.classList.add("active");
    listaTorneos.innerHTML = "";

    const lista = tipo === "6" ? torneos6 : torneos7;
    lista.forEach(t => {
        const div = document.createElement("div");
        div.classList.add("torneo");
        div.textContent = t;
        div.onclick = () => window.location.href = "zonas.html";
        listaTorneos.appendChild(div);
    });
}

function cerrarModal(id) {
    document.getElementById(id).classList.remove("active");
}
</script>

</body>
</html>
